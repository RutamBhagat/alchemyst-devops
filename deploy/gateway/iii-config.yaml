workers:
  - name: iii-worker-manager
    config:
      port: 49134

  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      logs_enabled: true
      logs_console_output: true

  - name: iii-http
    config:
      port: 3111
      host: 127.0.0.1
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
          - POST
          - OPTIONS
